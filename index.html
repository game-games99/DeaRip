<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dearip v1.0.2</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #161616;
            --text-color: #e0e0e0;
            --accent-color: #ff3e3e;
            --log-bg: #000;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 10px; line-height: 1.4; }
        h1 { font-size: 1.5rem; border-bottom: 2px solid #333; margin-bottom: 15px; padding-bottom: 5px; color: #fff; text-align: center; }
        h2 { font-size: 1.1rem; margin: 0 0 10px 0; color: #bbb; }
        .panel { border: 1px solid #333; padding: 15px; background: var(--panel-bg); border-radius: 8px; margin-bottom: 15px; }
        
        /* ステータス周り */
        .status-grid { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        /* スキルボタン */
        .skill-btn { display: block; width: 100%; margin-bottom: 10px; padding: 12px; background: #252525; color: #fff; border: 1px solid #444; border-radius: 6px; cursor: pointer; text-align: left; -webkit-tap-highlight-color: transparent; }
        .skill-btn:active { background: #333; transform: scale(0.98); }
        .skill-btn small { display: block; color: #aaa; font-size: 0.8rem; margin-top: 4px; }

        /* ログエリア */
        #log { height: 180px; overflow-y: auto; background: var(--log-bg); padding: 10px; font-size: 0.95rem; color: #00ff41; border: 1px solid #222; border-radius: 4px; margin-bottom: 15px; }
        
        /* 敵情報 */
        #enemy-area { text-align: center; }
        #enemy-status { font-size: 1.3rem; color: var(--accent-color); font-weight: bold; margin: 10px 0; }

        /* 探索ボタン */
        #search-btn { width: 100%; padding: 15px; font-size: 1.1rem; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; cursor: pointer; }
        #search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Ripセクション */
        .rip-panel { border: 2px solid var(--accent-color); background: #1a0505; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .part-item { padding: 12px; border: 1px solid #551111; background: #2a0a0a; margin: 8px 0; border-radius: 6px; font-size: 0.9rem; }
        .shred-btn { width: 100%; padding: 10px; background: transparent; color: #aaa; border: 1px solid #444; margin-top: 10px; font-size: 0.8rem; }
        
        .accent { color: var(--accent-color); }
    </style>
</head>
<body>
    <h1>Dearip <small>v1.0.2</small></h1>
    
    <div class="panel">
        <h2>SOUL: <span id="soul-name">覚醒前の魂</span></h2>
        <div id="status-display" class="status-grid"></div>
        <div id="skill-display"></div>
    </div>

    <div class="panel" id="enemy-area">
        <h2>ENEMY: <span id="enemy-name">待機中</span></h2>
        <div id="enemy-status"></div>
        <div id="log">深層へ進み、パーツを求めよ...</div>
        <button id="search-btn" onclick="encounter()">深層へ進む</button>
    </div>

    <div id="rip-section" class="rip-panel" style="display:none;">
        <h2 class="accent">解体（Rip）</h2>
        <div id="loot-list"></div>
        <button class="shred-btn" onclick="shredAll()">全て引き裂いて経験値にする</button>
    </div>

    <script>
        const VERSION = "1.0.2";
        
        const prefixData = ["神速の", "因果の", "虚無の", "疾風の", "強欲の", "焦熱の"];
        const skillData = {
            "HEAD": ["反転の理", "支配の眼", "空想の回路"],
            "BODY": ["拒絶の領域", "不動の城壁", "再生の繭"],
            "ARM": ["瞬閃", "爆発の拳", "収穫の爪"],
            "LEG": ["抜刀の舞", "虚空歩行", "追撃の歩法"]
        };

        let player = {
            hp: 300, maxHp: 300, atk: 50, soulExp: 0,
            equipment: {
                HEAD: { name: "無名の頭", prefix: "平穏な", skill: "瞑想", hp: 50, atk: 5 },
                BODY: { name: "無名の体", prefix: "平穏な", skill: "鼓動", hp: 100, atk: 0 },
                ARM: { name: "無名の腕", prefix: "平穏な", skill: "強打", hp: 30, atk: 15 },
                LEG: { name: "無名の脚", prefix: "平穏な", skill: "歩行", hp: 20, atk: 10 }
            }
        };

        let enemy = null;

        function updateUI() {
            let totalHp = 0, totalAtk = 0;
            let skillHtml = "";
            for (let key in player.equipment) {
                let p = player.equipment[key];
                totalHp += p.hp; totalAtk += p.atk;
                skillHtml += `<button class="skill-btn" onclick="attack('${key}')">
                    【${key}】${p.prefix}${p.name}
                    <small>Skill: ${p.skill} (ATK+${p.atk})</small>
                </button>`;
            }
            player.maxHp = totalHp;
            document.getElementById("status-display").innerHTML = 
                `<div>HP: ${player.hp} / ${player.maxHp}</div>
                 <div style="text-align:right">ATK: ${totalAtk}</div>
                 <div style="font-size:0.8rem; color:#888;">SOUL EXP: ${player.soulExp}</div>`;
            document.getElementById("skill-display").innerHTML = skillHtml;
        }

        function encounter() {
            document.getElementById("rip-section").style.display = "none";
            const parts = ["HEAD", "BODY", "ARM", "LEG"];
            let enemyPrefix = prefixData[Math.floor(Math.random() * prefixData.length)];
            enemy = {
                name: enemyPrefix + "異形",
                hp: 200 + Math.floor(Math.random() * 200),
                atk: 20 + Math.floor(Math.random() * 30),
                loot: parts.map(p => ({
                    part: p,
                    prefix: prefixData[Math.floor(Math.random() * prefixData.length)],
                    skill: skillData[p][Math.floor(Math.random() * skillData[p].length)],
                    hp: 50 + Math.floor(Math.random() * 50),
                    atk: 10 + Math.floor(Math.random() * 20)
                }))
            };
            document.getElementById("enemy-name").innerText = enemy.name;
            document.getElementById("enemy-status").innerText = `HP: ${enemy.hp}`;
            log(`<span class="accent">${enemy.name}</span> に遭遇。`);
            document.getElementById("search-btn").disabled = true;
        }

        function attack(partKey) {
            if (!enemy) return;
            let p = player.equipment[partKey];
            let totalAtk = 0;
            for(let k in player.equipment) totalAtk += player.equipment[k].atk;
            
            let dmg = Math.floor(totalAtk * (1 + Math.random() * 0.2));
            enemy.hp -= dmg;
            log(`${p.skill}! 敵に ${dmg} のダメージ。`);

            if (enemy.hp <= 0) {
                win();
            } else {
                let eDmg = enemy.atk;
                player.hp -= eDmg;
                log(`反撃を受けた！ ${eDmg} のダメージ。`);
                if (player.hp <= 0) {
                    player.hp = 0;
                    log("ソウルが砕け散った……。");
                    setTimeout(() => { location.reload(); }, 2000);
                }
            }
            updateUI();
            if (enemy) document.getElementById("enemy-status").innerText = `HP: ${enemy.hp}`;
        }

        function win() {
            log(`${enemy.name} を解体した。`);
            enemy.hp = 0;
            document.getElementById("search-btn").disabled = false;
            showRipSection();
        }

        function log(msg) {
            const l = document.getElementById("log");
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function showRipSection() {
            const list = document.getElementById("loot-list");
            list.innerHTML = "";
            enemy.loot.forEach((item, index) => {
                list.innerHTML += `<div class="part-item" onclick="equip(${index})">
                    <strong>【${item.part}】${item.prefix}パーツ</strong><br>
                    <small>Skill: ${item.skill} (HP+${item.hp} ATK+${item.atk})</small>
                </div>`;
            });
            document.getElementById("rip-section").style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        }

        function equip(index) {
            const newItem = enemy.loot[index];
            player.equipment[newItem.part] = {
                name: "パーツ",
                prefix: newItem.prefix,
                skill: newItem.skill,
                hp: newItem.hp,
                atk: newItem.atk
            };
            log(`${newItem.part} を換装。`);
            endRip();
        }

        function shredAll() {
            player.soulExp += 10;
            log("全てを引き裂き、ソウルを強化した。");
            endRip();
        }

        function endRip() {
            enemy = null;
            document.getElementById("enemy-name").innerText = "待機中";
            document.getElementById("enemy-status").innerText = "";
            document.getElementById("rip-section").style.display = "none";
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
