<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NECRAI - Necromancer RPG</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { border: 1px solid #444; padding: 15px; margin-bottom: 10px; background: #2a2a2a; }
        button { cursor: pointer; padding: 10px; margin-top: 5px; background: #550000; color: white; border: none; }
        .inventory-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .slot { border: 1px solid #333; padding: 5px; font-size: 12px; height: 50px; background: #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NECRAI: Dead Army Strategy</h1>
        
        <div class="card">
            <h2>主人公ステータス</h2>
            <div id="player-status">Lv: 1 | クラス: 駆け出しの死霊術師 | ATK: 10 | HP: 100</div>
        </div>

        <div class="card">
            <h2>軍団インベントリ (残り枠: <span id="slots-left">100</span>/100)</h2>
            <div id="inventory" class="inventory-list"></div>
        </div>

        <div class="card">
            <h2>敵生成</h2>
            <button onclick="generateEnemy()">敵を索敵する</button>
            <div id="enemy-display"></div>
        </div>
    </div>

    <script>
        const player = { level: 1, class: '駆け出しの死霊術師', atk: 10, hp: 100 };
        const army = [];
        const MAX_SLOTS = 100;

        function updateUI() {
            document.getElementById('player-status').innerText = `Lv: ${player.level} | クラス: ${player.class} | ATK: ${player.atk} | HP: ${player.hp}`;
            document.getElementById('slots-left').innerText = MAX_SLOTS - army.length;
            
            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            army.forEach((unit, index) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `${unit.title}${unit.job}<br><button onclick="absorb(${index})">吸収</button>`;
                invDiv.appendChild(slot);
            });
        }

        function generateEnemy() {
            const jobs = ['村人', '兵士', '騎士', '魔法使い', '僧侶', '勇者'];
            const titles = ['伝説の', '早い', '飢えた', '呪われし', '深淵の'];
            const enemy = {
                job: jobs[Math.floor(Math.random() * jobs.length)],
                title: titles[Math.floor(Math.random() * titles.length)],
                atk: Math.floor(Math.random() * 20) + 5
            };
            
            document.getElementById('enemy-display').innerHTML = `
                <div class="card">
                    <strong>${enemy.title}${enemy.job}</strong>を発見！<br>
                    <button onclick="addArmy(${JSON.stringify(enemy).replace(/"/g, '&quot;')})">ゾンビ化して編入</button>
                </div>
            `;
        }

        function addArmy(unit) {
            if (army.length < MAX_SLOTS) {
                army.push(unit);
                updateUI();
                document.getElementById('enemy-display').innerHTML = '';
            } else {
                alert('インベントリが満杯です！');
            }
        }

        function absorb(index) {
            const unit = army.splice(index, 1)[0];
            player.atk += Math.floor(unit.atk * 0.5);
            player.hp += 5;
            alert(`${unit.title}${unit.job}を吸収しました！`);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
