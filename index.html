<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dearip v1.1.1</title>
    <style>
        :root { --bg-color: #050505; --panel-bg: #121212; --text-color: #d0d0d0; --accent-color: #ff3e3e; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 10px; }
        .panel { border: 1px solid #333; padding: 15px; background: var(--panel-bg); margin-bottom: 10px; border-radius: 4px; }
        .soul-hp { font-size: 1.5rem; font-weight: bold; color: #fff; text-align: center; }
        .main-action-btn { width: 100%; padding: 18px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        #log { height: 140px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.8rem; margin-bottom: 10px; border: 1px solid #222; }
    </style>
</head>
<body>
    <h1>DEARIP <small>v1.1.1</small></h1>
    
    <div id="game-container" style="display:none;">
        <div class="panel">
            <div id="hp-display" class="soul-hp">---</div>
            <div id="status-text" style="text-align:center; font-size:0.8rem;"></div>
        </div>
        <div class="panel">
            <div id="log"></div>
            <button id="main-btn" class="main-action-btn" onclick="handleAction()">すすむ</button>
        </div>
    </div>

    <div id="base-container" class="panel">
        <h2>拠点</h2>
        <p>EXP: <span id="exp-total">0</span> | SEED: <span id="seed-total">0</span></p>
        <button onclick="startDungeon()">探索を開始する</button>
    </div>

    <script>
        let player = { baseHp: 100, baseAtk: 10, hp: 100, exp: 0, seed: 0, equipment: { HEAD: {hp:50, atk:5}, BODY: {hp:100, atk:0}, ARM: {hp:30, atk:15}, LEG: {hp:20, atk:10} } };
        let dungeon = { floor: 0, active: false };
        let enemy = null;

        function handleAction() {
            if (enemy) executeAttack();
            else encounter();
        }

        function encounter() {
            if (dungeon.floor >= 30) { dungeon.floor = 0; returnToBase("深層を制覇した。"); return; }
            enemy = { name: "異形", hp: 100 + dungeon.floor * 10, atk: 5 + dungeon.floor * 2 };
            updateUI();
        }

        function executeAttack() {
            let totalAtk = player.baseAtk;
            for(let k in player.equipment) totalAtk += player.equipment[k].atk;
            enemy.hp -= totalAtk;
            
            if (enemy.hp <= 0) {
                log("撃破。");
                player.exp += 10;
                if(Math.random() < 0.3) player.seed++;
                dungeon.floor++;
                enemy = null;
            } else {
                player.hp -= enemy.atk;
                log(`被ダメ ${enemy.atk}。現在HP: ${Math.max(0, player.hp)}`);
                if (player.hp <= 0) {
                    returnToBase("敗北。拠点へ帰還した。");
                    return;
                }
            }
            updateUI();
        }

        function returnToBase(msg) {
            alert(msg);
            dungeon.active = false;
            enemy = null;
            document.getElementById("game-container").style.display = "none";
            document.getElementById("base-container").style.display = "block";
            updateUI();
        }

        function startDungeon() {
            dungeon.active = true;
            dungeon.floor = 1;
            player.hp = player.baseHp; // 全回復
            for(let k in player.equipment) player.hp += player.equipment[k].hp;
            document.getElementById("base-container").style.display = "none";
            document.getElementById("game-container").style.display = "block";
            updateUI();
        }

        function updateUI() {
            document.getElementById("hp-display").innerText = `HP: ${Math.max(0, player.hp)}`;
            document.getElementById("exp-total").innerText = player.exp;
            document.getElementById("seed-total").innerText = player.seed;
            const btn = document.getElementById("main-btn");
            btn.innerText = enemy ? "こうげき" : "すすむ";
        }
        
        function log(m) { document.getElementById("log").innerHTML += `<div>${m}</div>`; }
        updateUI();
    </script>
</body>
</html>
