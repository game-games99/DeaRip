<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dearip v1.0.1</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 20px; }
        h1 { border-bottom: 2px solid #555; padding-bottom: 10px; color: #fff; }
        .container { display: flex; gap: 20px; }
        .panel { border: 1px solid #444; padding: 15px; flex: 1; background: #1a1a1a; }
        .skill-btn { display: block; width: 100%; margin: 5px 0; padding: 10px; background: #333; color: #fff; border: 1px solid #666; cursor: pointer; text-align: left; }
        .skill-btn:hover { background: #444; border-color: #888; }
        #log { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.9em; color: #0f0; border: 1px solid #333; }
        .rip-panel { margin-top: 20px; border: 2px solid #a00; padding: 15px; display: none; }
        .part-item { cursor: pointer; padding: 5px; border: 1px solid #555; margin: 5px 0; }
        .part-item:hover { background: #333; }
        .accent { color: #ff3e3e; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Dearip <small>v1.0.1</small></h1>
    
    <div class="container">
        <div class="panel">
            <h2>SOUL: <span id="soul-name">覚醒前の魂</span></h2>
            <div id="status-display"></div>
            <div id="skill-display"></div>
        </div>

        <div class="panel">
            <h2>ENEMY: <span id="enemy-name">探索中...</span></h2>
            <div id="enemy-status"></div>
            <div id="log">探索を開始してください...</div>
            <button id="search-btn" onclick="encounter()">深層へ進む</button>
        </div>
    </div>

    <div id="rip-section" class="rip-panel">
        <h2 class="accent">解体（Rip）の刻</h2>
        <p>敵の残骸から部位を一つ選び、ソウルに縫い付けよ。さもなくば全てを引き裂け。</p>
        <div id="loot-list"></div>
        <button onclick="shredAll()">全て引き裂いてソウル経験値にする</button>
    </div>

    <script>
        const VERSION = "1.0.1";
        
        // 二つ名とパーツのライブラリ（ランダム生成の種）
        const prefixData = ["神速の", "因果の", "虚無の", "疾風の", "強欲の", "焦熱の"];
        const skillData = {
            "HEAD": ["反転の理", "支配の眼", "空想の回路"],
            "BODY": ["拒絶の領域", "不動の城壁", "再生の繭"],
            "ARM": ["瞬閃", "爆発の拳", "収穫の爪"],
            "LEG": ["抜刀の舞", "虚空歩行", "追撃の歩法"]
        };

        // プレイヤー初期装備
        let player = {
            hp: 300, maxHp: 300, atk: 50, soulExp: 0,
            equipment: {
                HEAD: { name: "無名の頭", prefix: "平穏な", skill: "瞑想", hp: 50, atk: 5 },
                BODY: { name: "無名の体", prefix: "平穏な", skill: "鼓動", hp: 100, atk: 0 },
                ARM: { name: "無名の腕", prefix: "平穏な", skill: "強打", hp: 30, atk: 15 },
                LEG: { name: "無名の脚", prefix: "平穏な", skill: "歩行", hp: 20, atk: 10 }
            }
        };

        let enemy = null;

        // ステータス更新
        function updateUI() {
            let totalHp = 0, totalAtk = 0;
            let skillHtml = "";
            for (let key in player.equipment) {
                let p = player.equipment[key];
                totalHp += p.hp; totalAtk += p.atk;
                skillHtml += `<button class="skill-btn" onclick="attack('${key}')">【${key}】${p.prefix}${p.name}<br>┗ Skill: ${p.skill}</button>`;
            }
            player.maxHp = totalHp;
            document.getElementById("status-display").innerHTML = `<p>HP: ${player.hp} / ${player.maxHp}<br>ATK: ${totalAtk}<br>SOUL EXP: ${player.soulExp}</p>`;
            document.getElementById("skill-display").innerHTML = skillHtml;
        }

        // 敵遭遇
        function encounter() {
            document.getElementById("rip-section").style.display = "none";
            const parts = ["HEAD", "BODY", "ARM", "LEG"];
            let enemyPrefix = prefixData[Math.floor(Math.random() * prefixData.length)];
            enemy = {
                name: enemyPrefix + "異形",
                hp: 200 + Math.floor(Math.random() * 200),
                atk: 20 + Math.floor(Math.random() * 30),
                loot: parts.map(p => ({
                    part: p,
                    prefix: prefixData[Math.floor(Math.random() * prefixData.length)],
                    skill: skillData[p][Math.floor(Math.random() * skillData[p].length)],
                    hp: 50 + Math.floor(Math.random() * 50),
                    atk: 10 + Math.floor(Math.random() * 20)
                }))
            };
            document.getElementById("enemy-name").innerText = enemy.name;
            document.getElementById("enemy-status").innerText = `HP: ${enemy.hp}`;
            log(`警告：<span class="accent">${enemy.name}</span> が現れた。`);
            document.getElementById("search-btn").disabled = true;
        }

        // 戦闘
        function attack(partKey) {
            if (!enemy) return;
            let p = player.equipment[partKey];
            let dmg = player.equipment.ARM.atk + player.equipment[partKey].atk; // 簡易計算
            enemy.hp -= dmg;
            log(`ソウルが鳴動する。${p.skill}！ ${enemy.name}に ${dmg} のダメージ。`);

            if (enemy.hp <= 0) {
                win();
            } else {
                let eDmg = enemy.atk;
                player.hp -= eDmg;
                log(`${enemy.name}の反撃！ ${eDmg} のダメージを受けた。`);
                if (player.hp <= 0) log("ソウルが霧散した……（敗北）");
            }
            updateUI();
            if (enemy) document.getElementById("enemy-status").innerText = `HP: ${enemy.hp}`;
        }

        function win() {
            log(`<span class="accent">${enemy.name} を解体した。</span>`);
            enemy.hp = 0;
            document.getElementById("search-btn").disabled = false;
            showRipSection();
        }

        function log(msg) {
            const l = document.getElementById("log");
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        // Ripセクション表示
        function showRipSection() {
            const list = document.getElementById("loot-list");
            list.innerHTML = "";
            enemy.loot.forEach((item, index) => {
                list.innerHTML += `<div class="part-item" onclick="equip(${index})">
                    【${item.part}】${item.prefix}パーツ (Skill: ${item.skill} / HP+${item.hp} ATK+${item.atk})
                </div>`;
            });
            document.getElementById("rip-section").style.display = "block";
        }

        // 換装（Equip）
        function equip(index) {
            const newItem = enemy.loot[index];
            player.equipment[newItem.part] = {
                name: "パーツ",
                prefix: newItem.prefix,
                skill: newItem.skill,
                hp: newItem.hp,
                atk: newItem.atk
            };
            log(`${newItem.part} を ${newItem.prefix}パーツ に換装した。`);
            endRip();
        }

        // 全て引き裂く（Shred）
        function shredAll() {
            player.soulExp += 10;
            log("全てのパーツを引き裂き、ソウルを強化した。");
            endRip();
        }

        function endRip() {
            enemy = null;
            document.getElementById("enemy-name").innerText = "探索中...";
            document.getElementById("enemy-status").innerText = "";
            document.getElementById("rip-section").style.display = "none";
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
